<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Radio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="radio-player">
        <img src="logo.png" alt="Radio Logo" class="radio-logo">
        <h1>Online Radio</h1>
        <h2 id="station-name">Select a station</h2>

        <canvas id="visualizer"></canvas>

        <div class="view-toggle">
            <span>All</span>
            <label class="switch">
                <input type="checkbox" id="favoritesToggle">
                <span class="slider round"></span>
            </label>
            <span>Favorites</span>
        </div>

        <div class="station-buttons">
            <!-- Stations will be rendered here by JavaScript -->
        </div>

        <button id="addStationBtn" class="add-btn" title="Add new station">+</button>

        <audio id="audioPlayer" crossorigin="anonymous"></audio>

        <div class="controls">
            <button id="prevBtn" title="Previous">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><rect x="5" y="4" width="2" height="16"></rect></svg>
            </button>
            <button id="playPauseBtn" title="Play">
                <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg class="pause-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                <svg class="loading-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
            </button>
            <button id="nextBtn" title="Next">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><rect x="17" y="4" width="2" height="16"></rect></svg>
            </button>
        </div>
    </div>

    <!-- Add Station Modal -->
    <div id="addStationModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Add New Station</h2>
            <label for="newStationName" class="sr-only">Station Name</label>
            <input type="text" id="newStationName" placeholder="Station Name">
            <label for="newStationUrl" class="sr-only">Stream URL</label>
            <input type="url" id="newStationUrl" placeholder="Stream URL">
            <button id="saveStationBtn">Save</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
