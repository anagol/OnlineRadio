<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Radio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="radio-player">
        <img src="logo.png" alt="Radio Logo" class="radio-logo">
        <h1>Online Radio</h1>
        <h2 id="station-name">Select a station</h2>
        <div class="station-buttons">
            <button class="station-btn" data-src="https://radiorecord.hostingradio.ru/mdl96.aacp" data-name="Medlyak FM">Medlyak FM</button>
            <button class="station-btn" data-src="https://rusradio.hostingradio.ru/rusradio96.aacp?0.7839820559672495" data-name="Русское Радио">Русское Радио</button>
            <button class="station-btn" data-src="https://silverrain.hostingradio.ru/silver32.aacp?radiostatistica=IRP_FMPlay" data-name="Серебряный дождь">Серебряный дождь</button>
            <button class="station-btn" data-src="https://fed.fmplay.ru:8000/relax-32.aac" data-name="Relax FM">Relax FM</button>
        </div>
        <audio id="audioPlayer"></audio>
        <div class="controls">
            <button id="prevBtn" title="Previous">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 19 2 12 11 5 11 19"></polygon><polygon points="22 19 13 12 22 5 22 19"></polygon></svg>
            </button>
            <button id="playPauseBtn" title="Play">
                <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg class="pause-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button id="nextBtn" title="Next">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
